                "\x90\x90\x90\x90\x90",
                "\x68\x7F\x00\x00\x01",
                "\xC3",
                "\x48\x31\xc0\x48\x89\xc2\x48\x89\xe7",
                "\x6A\x0B\x58\x99\x52\x57",
                "\x68\x2F\x2F\x73\x68\x68\x2F\x62\x69\x6E\x89\xe3",
                "\xBA\xAD\xF0\x0D",
                "\x68\x2F\x62\x69\x6E\x89\xe3\x6A\x0B\x58",
                "\x90\x90\x90\x90\x90\x90\x90\x90",
                "\xB8\x01\x00\x00\x00\xFF\xD0",
                "\x48\x31\xc0\x48\x89\xc2\x48\x89\xe7",
                "\x68\x2F\x2F\x73\x68\x68\x2F\x62\x69\x6E\x89\xe3",
                "\x52\x57\x68\x2F\x2F\x73\x68",
                "\xFF\xD0",
                "\x68\x7F\x00\x00\x01",
                "\xEB\xFE",
                "\xC3",
                "\xAA\xBB\xCC\xDD\xEE\xFF\x11\x22\x33",
                "\x6A\x0B\x58\x99\x52\x57",
